<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VetInc Team Portal</title>
<link rel="icon" type="image/png" href="assets/vetinc-logo.png">
<style>
:root{--navy:#0f172a;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#d97706;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--navy);min-height:100vh}
.hidden{display:none!important}
button{cursor:pointer;font:inherit;border:0;border-radius:10px;font-weight:700;padding:10px 16px;transition:all .12s}
button:active{transform:scale(.97)}

/* Login */
.login{min-height:100vh;display:grid;place-items:center;padding:20px}
.login-card{width:min(400px,100%);background:white;border:1px solid var(--line);border-radius:20px;padding:32px;box-shadow:0 20px 60px rgba(15,23,42,.08)}
.login-card img{height:64px;margin-bottom:16px}
.login-card h1{font-size:22px;margin-bottom:4px}
.login-card p{color:var(--muted);font-size:14px;margin-bottom:20px}
.login-card label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:12px 0 5px}
.login-card input{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:12px;font-size:15px}
.login-card input:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.login-card button{width:100%;background:var(--navy);color:white;margin-top:20px;padding:13px;font-size:15px;border-radius:12px}
.login-err{color:var(--red);font-size:13px;margin-top:10px;display:none}

/* App */
.app{display:none;max-width:680px;margin:0 auto;padding:0 16px 60px}
.app.active{display:block}

/* Header */
.header{position:sticky;top:0;background:rgba(248,250,252,.92);backdrop-filter:blur(12px);padding:14px 0;margin-bottom:8px;z-index:10;border-bottom:1px solid var(--line);width:100%}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.header-left img{height:36px}
.header-name{font-weight:800;font-size:15px}
.header-role{font-size:11px;color:var(--muted)}
.header button{background:white;border:1px solid var(--line);font-size:12px;padding:7px 12px}

/* Stats bar */
.stats{display:flex;gap:8px;margin-bottom:16px}
.stat{flex:1;background:white;border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:900;letter-spacing:-.03em}
.stat-label{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:.04em;margin-top:2px}
.stat.pending .stat-num{color:var(--navy)}
.stat.called .stat-num{color:var(--amber)}
.stat.booked .stat-num{color:var(--green)}

/* Lead list */
.lead-list{display:grid;gap:8px}
.lead{background:white;border:1px solid var(--line);border-radius:14px;padding:14px;transition:border-color .1s}
.lead:hover{border-color:#cbd5e1}
.lead-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.lead-name{font-weight:800;font-size:15px;line-height:1.3}
.lead-meta{font-size:13px;color:var(--muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.lead-phone{color:var(--blue);font-weight:700;text-decoration:none}
.lead-status{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:999px;white-space:nowrap}
.lead-status.new{background:#f1f5f9;color:#475569}
.lead-status.called{background:#fffbeb;color:#92400e}
.lead-status.booked{background:#dcfce7;color:#166534}
.lead-status.not_interested{background:#fef2f2;color:#991b1b}

/* Quick actions */
.lead-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.lead-actions button{font-size:12px;padding:8px 12px;border-radius:8px}
.btn-status{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.btn-status:hover{background:#e2e8f0}
.btn-status.booked{background:var(--green);color:white}
.btn-status.no{background:#fef2f2;color:var(--red);border:1px solid #fecaca}
.btn-status.skip{background:white;color:var(--muted);border:1px solid var(--line)}
.btn-call{background:var(--navy);color:white;font-size:12px;padding:8px 14px;border-radius:8px;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.btn-book{background:var(--blue);color:white}

/* Notes */
.lead-notes{margin-top:8px}
.lead-notes input{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--navy)}
.lead-notes input:focus{outline:0;border-color:var(--blue)}
.lead-email-badge{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;font-weight:800;color:var(--green);background:#dcfce7;padding:3px 8px;border-radius:999px}
.lead-email-badge.missing{color:var(--amber);background:#fffbeb}
.btn-log{background:var(--navy);color:white;font-size:13px;padding:9px 16px;border-radius:10px;width:100%;margin-top:8px}

/* Wrap-up modal */
.modal-overlay{position:fixed;inset:0;background:rgba(12,22,36,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal-overlay.open{display:flex}
.modal{width:min(460px,100%);background:white;border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.25);overflow:hidden;max-height:90vh;overflow-y:auto}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--line)}
.modal-head h2{font-size:18px;font-weight:900}
.modal-head p{font-size:13px;color:var(--muted);margin-top:3px}
.modal-body{padding:20px}
.modal-body label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:14px 0 6px}
.modal-body label:first-child{margin-top:0}
.modal-body select,.modal-body input,.modal-body textarea{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:11px;font-size:14px;background:white}
.modal-body select:focus,.modal-body input:focus,.modal-body textarea:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.modal-body textarea{min-height:70px;resize:vertical;font-family:inherit}
.email-highlight{background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:14px;margin:6px 0 10px}
.email-highlight label{color:#92400e}
.email-highlight input{border-color:#f59e0b}
.email-highlight input:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.email-note{font-size:12px;color:#92400e;margin-top:5px}
.modal-actions{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--line);background:#f8fafc}
.modal-actions button{flex:1;padding:12px;font-size:14px;border-radius:10px}
.btn-save{background:var(--green);color:white}
.btn-cancel{background:white;color:var(--navy);border:1px solid var(--line)}
.save-status{font-size:12px;color:var(--muted);text-align:center;padding:4px}

/* Agreement gate */
.agreement{display:none;max-width:620px;margin:0 auto;padding:16px 16px 60px}
.agreement.active{display:block}
.agreement-card{background:white;border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:16px}
.agreement-card h2{font-size:20px;margin:0 0 12px}
.agreement-card h3{font-size:14px;margin:16px 0 6px;color:var(--navy)}
.agreement-card p,.agreement-card li{font-size:14px;line-height:1.6;color:#334155}
.agreement-card ul{padding-left:20px;margin:8px 0}
.agreement-card li{margin-bottom:4px}
.agreement-meta{font-size:12px;color:var(--muted);margin-top:16px;padding-top:12px;border-top:1px solid var(--line)}
.sig-box{background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:16px;margin-top:16px}
.sig-box label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;color:#92400e;letter-spacing:.04em;margin-bottom:8px}
.sig-input{width:100%;border:1px solid #f59e0b;border-radius:10px;padding:12px;font-size:16px;font-style:italic;background:white;font-family:'Georgia',serif}
.sig-input:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.sig-note{font-size:12px;color:var(--muted);margin-top:6px}
.agreement-btn{width:100%;background:var(--navy);color:white;border:0;border-radius:12px;padding:14px;font-size:15px;font-weight:700;margin-top:14px}
.agreement-btn:disabled{opacity:.5;cursor:not-allowed}
.agreement-err{color:var(--red);font-size:13px;margin-top:8px;display:none}

/* Admin */
.admin-tabs{display:flex;gap:4px;margin-bottom:16px}
.admin-tabs button{background:white;border:1px solid var(--line);font-size:13px;padding:9px 14px;border-radius:10px}
.admin-tabs button.active{background:var(--navy);color:white;border-color:var(--navy)}
.admin-section{margin-bottom:20px}
.admin-section h2{font-size:16px;margin-bottom:10px}
.rep-row{background:white;border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rep-name{font-weight:700;font-size:14px}
.rep-stats{font-size:12px;color:var(--muted)}
.rep-quota{display:flex;align-items:center;gap:6px}
.rep-quota input{width:50px;border:1px solid var(--line);border-radius:8px;padding:6px;text-align:center;font-size:13px}
.btn-del{background:#fef2f2;color:var(--red);border:1px solid #fecaca;font-size:11px;padding:6px 10px;border-radius:8px}
.btn-del:hover{background:#fee2e2}

/* Analytics */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.kpi{background:white;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.kpi-num{font-size:26px;font-weight:900;letter-spacing:-.03em}
.kpi-lbl{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:.04em;margin-top:2px}
.kpi.green .kpi-num{color:var(--green)}
.kpi.amber .kpi-num{color:var(--amber)}
.kpi.red .kpi-num{color:var(--red)}
.kpi.blue .kpi-num{color:var(--blue)}
.analytics-table{width:100%;border-collapse:collapse;font-size:13px;background:white;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.analytics-table th{text-align:left;padding:10px 12px;background:#f8fafc;font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:800;letter-spacing:.04em;border-bottom:1px solid var(--line)}
.analytics-table td{padding:10px 12px;border-bottom:1px solid var(--line)}
.analytics-table tr:last-child td{border-bottom:0}
.analytics-table .num{text-align:center;font-weight:800}
.last-active{font-size:11px;color:var(--muted)}

@media(max-width:600px){
  .stats{flex-wrap:wrap}
  .stat{min-width:calc(50% - 4px)}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login" id="login">
  <div class="login-card">
    <img src="assets/vetinc-logo.png" alt="VetInc">
    <h1>Team Portal</h1>
    <p>Sign in to see your leads.</p>
    <label>Email</label>
    <input id="liEmail" type="email" placeholder="you@vetinc.ca">
    <label>Password</label>
    <input id="liPass" type="password" placeholder="Password">
    <div class="login-err" id="liErr">Wrong email or password.</div>
    <button id="liBtn">Sign in</button>
    <button id="liAdmin" style="width:100%;background:white;color:var(--navy);border:1px solid var(--line);margin-top:10px;padding:13px;font-size:14px;border-radius:12px;font-weight:700">Admin login</button>
    <p style="color:var(--muted);font-size:12px;margin-top:10px;text-align:center">Admin shortcut fills the admin email. Enter your password to continue.</p>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-left">
        <img src="assets/vetinc-logo.png" alt="VetInc">
        <div>
          <div class="header-name" id="hName"></div>
          <div class="header-role" id="hRole"></div>
        </div>
      </div>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div id="adminView" class="hidden">
    <div class="admin-tabs">
      <button id="tabReps" class="active" onclick="adminTab('reps')">Reps</button>
      <button id="tabAnalytics" onclick="adminTab('analytics')">Analytics</button>
    </div>
    <div id="adminReps">
      <div class="admin-section">
        <h2>Reps</h2>
        <div id="repList"></div>
      </div>
    </div>
    <div id="adminAnalytics" class="hidden">
      <div id="analyticsContent"></div>
    </div>
  </div>

  <div id="repView">
    <div class="stats" id="stats"></div>
    <div class="lead-list" id="leadList"></div>
  </div>
</div>

<!-- Call wrap-up modal -->
<div class="modal-overlay" id="wrapModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="wrapTitle">Log call</h2>
      <p id="wrapSub"></p>
    </div>
    <div class="modal-body">
      <label>Call outcome</label>
      <select id="wrapStatus">
        <option value="no_answer">No answer</option>
        <option value="left_voicemail">Left voicemail</option>
        <option value="called">Spoke to someone</option>
        <option value="interested">Interested</option>
        <option value="booked">Meeting booked</option>
        <option value="not_interested">Not interested</option>
        <option value="follow_up">Follow up later</option>
      </select>

      <label>Who did you reach?</label>
      <select id="wrapStage">
        <option value="">Not sure / didn't connect</option>
        <option value="no_answer">No answer</option>
        <option value="left_voicemail">Left voicemail</option>
        <option value="receptionist_only">Receptionist only</option>
        <option value="gatekeeper_pushback">Gatekeeper blocked me</option>
        <option value="owner_unavailable">Owner not available</option>
        <option value="owner_reached">Reached the owner</option>
        <option value="qualified">Qualified the owner</option>
      </select>

      <div class="email-highlight">
        <label>Owner's email</label>
        <input id="wrapEmail" type="email" placeholder="owner@clinic.com" value="">
        <div class="email-note">Always ask. No email = dead lead.</div>
      </div>

      <label>Notes</label>
      <textarea id="wrapNotes" placeholder="What happened? Any details about the clinic, timing, objections..."></textarea>
    </div>
    <div class="save-status" id="wrapStatus2"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeWrap()">Cancel</button>
      <button class="btn-save" id="wrapSave" onclick="saveWrap()">Save outcome</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://rnqhhzatlxmyvccdvqkr.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucWhoemF0bHhteXZjY2R2cWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTQ5ODUsImV4cCI6MjA5MDU5MDk4NX0.zokle21pVEPG5bIOFiyZIWYkYIwhkolWNOhJ7Cbub30';
const JACK_CAL='https://calendly.com/wildejack1010/30min';
const $=id=>document.getElementById(id);
let session=null, leads=[];

async function rpc(fn, body){
  const r=await fetch(`${SB_URL}/rest/v1/rpc/${fn}`,{
    method:'POST',
    headers:{apikey:SB_ANON,Authorization:'Bearer '+SB_ANON,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const txt=await r.text();
  if(!r.ok) throw new Error(txt||r.statusText);
  return txt?JSON.parse(txt):null;
}

function today(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`}

// Login
$('liBtn').onclick=async()=>{
  const email=$('liEmail').value.trim(), pass=$('liPass').value.trim();
  if(!email||!pass) return;
  $('liErr').style.display='none';
  try{
    const res=await rpc('vetinc_team_login',{p_name:email,p_code:pass});
    if(!res?.length) throw new Error('bad');
    session={...res[0],code:pass};
    start();
  }catch(e){$('liErr').style.display='block'}
};
$('liPass').addEventListener('keydown',e=>{if(e.key==='Enter')$('liBtn').click()});
$('liAdmin').onclick=()=>{$('liEmail').value='jack@vetinc.ca';$('liPass').focus();};

async function start(){
  $('login').classList.add('hidden');
  $('app').classList.add('active');
  $('hName').textContent=session.name;
  $('hRole').textContent=session.role==='admin'?'Admin':'Caller';

  if(session.role==='admin'){
    $('adminView').classList.remove('hidden');
    $('repView').classList.add('hidden');
    await loadReps();
  } else {
    $('adminView').classList.add('hidden');
    $('repView').classList.remove('hidden');
    await loadLeads();
    render();
  }
}

async function loadLeads(){
  try{
    leads=await rpc('vetinc_team_get_leads',{p_user_id:session.id,p_code:session.code,p_date:today()})||[];
  }catch(e){console.error(e);leads=[]}
}

function stats(){
  const total=leads.length;
  const called=leads.filter(l=>l.status==='called'||l.status==='no_answer'||l.status==='left_voicemail'||l.status==='follow_up').length;
  const booked=leads.filter(l=>l.status==='booked').length;
  const remaining=total-called-booked;
  return {total,called,booked,remaining};
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function statusLabel(s){
  return {new:'New',called:'Called',no_answer:'No answer',left_voicemail:'Voicemail',interested:'Interested',not_interested:'Not interested',follow_up:'Follow up',booked:'Booked',emailed:'Emailed',closed:'Closed'}[s]||'New';
}

function render(){
  const st=stats();
  $('stats').innerHTML=`
    <div class="stat pending"><div class="stat-num">${st.remaining}</div><div class="stat-label">To call</div></div>
    <div class="stat called"><div class="stat-num">${st.called}</div><div class="stat-label">Called</div></div>
    <div class="stat booked"><div class="stat-num">${st.booked}</div><div class="stat-label">Booked</div></div>
  `;

  // Sort: new first, then called, booked last
  const sorted=[...leads].sort((a,b)=>{
    const order={new:0,no_answer:1,left_voicemail:2,called:3,follow_up:4,interested:5,booked:6,not_interested:7};
    return (order[a.status]||0)-(order[b.status]||0);
  });

  $('leadList').innerHTML=sorted.map(l=>{
    const phone=(l.phone||'').replace(/[^\\d+]/g,'');
    const dr=l.dr_name?esc(l.dr_name):'';
    const sClass=l.status||'new';
    const hasEmail=l.owner_email&&l.owner_email.trim();
    const emailBadge=hasEmail
      ?`<span class="lead-email-badge">✉ ${esc(l.owner_email)}</span>`
      :`<span class="lead-email-badge missing">✉ No email captured</span>`;
    const notes=l.notes?`<div class="lead-notes"><input type="text" placeholder="Quick note..." value="${esc(l.notes)}" onchange="saveNotes('${l.id}',this.value)"></div>`:'';
    return `
    <div class="lead">
      <div class="lead-top">
        <div>
          <div class="lead-name">${esc(l.clinic_name||'Unknown')}</div>
          <div class="lead-meta">
            ${phone?`<a class="lead-phone" href="tel:${phone}">${esc(l.phone)}</a>`:''}
            ${dr?`<span>Dr. ${dr}</span>`:''}
            ${l.city?`<span>${esc(l.city)}, ${esc(l.province||'')}</span>`:''}
          </div>
          ${emailBadge}
        </div>
        <span class="lead-status ${sClass}">${statusLabel(l.status)}</span>
      </div>
      <div class="lead-actions">
        <button class="btn-log" onclick="openWrap('${l.id}')">Log call</button>
      </div>
      ${notes}
    </div>`;
  }).join('');
}

// Call wrap-up modal
let wrapLeadId=null;

function openWrap(id){
  const lead=leads.find(l=>l.id===id);
  if(!lead) return;
  wrapLeadId=id;
  $('wrapTitle').textContent='Log call — '+(lead.clinic_name||'Unknown');
  $('wrapSub').textContent=lead.phone||'No phone on file';
  $('wrapStatus').value=lead.status&&lead.status!=='new'?lead.status:'no_answer';
  $('wrapStage').value=lead.call_stage||'';
  $('wrapEmail').value=lead.owner_email||'';
  $('wrapNotes').value=lead.notes||'';
  $('wrapStatus2').textContent='';
  $('wrapModal').classList.add('open');
}

function closeWrap(){
  wrapLeadId=null;
  $('wrapModal').classList.remove('open');
}

async function saveWrap(){
  if(!wrapLeadId) return;
  const lead=leads.find(l=>l.id===wrapLeadId);
  if(!lead) return;
  const status=$('wrapStatus').value;
  const stage=$('wrapStage').value;
  const email=$('wrapEmail').value.trim();
  const notes=$('wrapNotes').value.trim();
  const btn=$('wrapSave');
  const old=btn.textContent;
  btn.disabled=true;btn.textContent='Saving...';
  $('wrapStatus2').textContent='';
  try{
    await rpc('vetinc_team_update_lead',{
      p_user_id:session.id,p_code:session.code,p_lead_id:wrapLeadId,
      p_status:status,p_notes:notes,p_call_stage:stage,
      p_rejection_reason:'',p_scheduled_call_at:null,
      p_callback_needed:false,p_callback_at:null,p_callback_reason:'',
      p_owner_email:email
    });
    lead.status=status;lead.call_stage=stage;
    lead.owner_email=email;lead.notes=notes;
    render();
    closeWrap();
  }catch(e){
    console.error(e);
    $('wrapStatus2').textContent='Error: '+(e.message||'Could not save');
    $('wrapStatus2').style.color='var(--red)';
  }finally{btn.disabled=false;btn.textContent=old;}
}

async function saveNotes(id, notes){
  const lead=leads.find(l=>l.id===id);
  if(!lead) return;
  lead.notes=notes;
  try{
    await rpc('vetinc_team_update_lead',{
      p_user_id:session.id, p_code:session.code, p_lead_id:id,
      p_status:lead.status||'called', p_notes:notes, p_call_stage:lead.call_stage||'',
      p_rejection_reason:'', p_scheduled_call_at:null,
      p_callback_needed:false, p_callback_at:null, p_callback_reason:'',
      p_owner_email:lead.owner_email||''
    });
  }catch(e){console.error(e)}
}

// Admin
let adminTabCurrent='reps';

function adminTab(tab){
  adminTabCurrent=tab;
  $('tabReps').classList.toggle('active',tab==='reps');
  $('tabAnalytics').classList.toggle('active',tab==='analytics');
  $('adminReps').classList.toggle('hidden',tab!=='reps');
  $('adminAnalytics').classList.toggle('hidden',tab!=='analytics');
  if(tab==='analytics') loadAnalytics();
}

async function loadReps(){
  try{
    const users=await rpc('vetinc_team_get_users',{p_user_id:session.id,p_code:session.code})||[];
    $('repList').innerHTML=users.map(u=>{
      return `
      <div class="rep-row">
        <div>
          <div class="rep-name">${esc(u.name)}</div>
          <div class="rep-stats">${esc(u.email)} | ${u.role}${u.active===false?' | INACTIVE':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="rep-quota">
            <input type="number" min="0" max="50" value="${u.daily_call_quota||10}" onchange="setQuota('${u.id}',this.value)">
            <span style="font-size:11px;color:var(--muted)">/day</span>
          </div>
          ${u.role!=='admin'?`<button class="btn-del" onclick="deleteRep('${u.id}','${esc(u.name)}')">Delete</button>`:''}
        </div>
      </div>`;
    }).join('');
  }catch(e){console.error(e)}
}

async function deleteRep(id, name){
  if(!confirm('Delete '+name+'? This removes their assigned leads too.')) return;
  try{
    await rpc('vetinc_team_admin_delete_user',{p_admin_id:session.id,p_admin_code:session.code,p_employee_id:id});
    await loadReps();
  }catch(e){console.error(e);alert('Could not delete: '+(e.message||e))}
}

async function loadAnalytics(){
  try{
    const data=await rpc('vetinc_team_admin_analytics',{p_admin_id:session.id,p_admin_code:session.code});
    if(data?.error){$('analyticsContent').innerHTML='<p style="color:var(--red)">Error loading analytics.</p>';return;}
    const t=data.totals||{};
    const reps=data.reps||[];
    const conversionRate=t.total_leads>0?((t.booked/t.total_leads)*100).toFixed(1):'0.0';

    $('analyticsContent').innerHTML=`
      <div class="kpi-row">
        <div class="kpi blue"><div class="kpi-num">${t.total_leads||0}</div><div class="kpi-lbl">Total Leads</div></div>
        <div class="kpi amber"><div class="kpi-num">${t.called||0}</div><div class="kpi-lbl">Called</div></div>
        <div class="kpi green"><div class="kpi-num">${t.booked||0}</div><div class="kpi-lbl">Booked</div></div>
      </div>
      <div class="kpi-row" style="grid-template-columns:repeat(2,1fr)">
        <div class="kpi"><div class="kpi-num">${t.interested||0}</div><div class="kpi-lbl">Interested</div></div>
        <div class="kpi red"><div class="kpi-num">${t.rejected||0}</div><div class="kpi-lbl">Rejected</div></div>
      </div>
      <div style="background:white;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px;text-align:center">
        <div style="font-size:28px;font-weight:900;color:var(--navy)">${conversionRate}%</div>
        <div style="font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:.04em;margin-top:2px">Booking Rate</div>
      </div>
      <table class="analytics-table">
        <thead>
          <tr>
            <th>Rep</th>
            <th class="num">Total</th>
            <th class="num">New</th>
            <th class="num">Called</th>
            <th class="num">Booked</th>
            <th class="num">Rej.</th>
            <th>Last Active</th>
          </tr>
        </thead>
        <tbody>
          ${reps.map(r=>{
            const la=r.last_active?new Date(r.last_active).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'Never';
            return `<tr>
              <td>${esc(r.name)}<div class="last-active">${esc(r.email)}</div></td>
              <td class="num">${r.total_leads||0}</td>
              <td class="num">${r.new_leads||0}</td>
              <td class="num">${r.called_leads||0}</td>
              <td class="num" style="color:var(--green)">${r.booked_leads||0}</td>
              <td class="num" style="color:var(--red)">${r.rejected_leads||0}</td>
              <td class="last-active">${la}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
  }catch(e){console.error(e);$('analyticsContent').innerHTML='<p style="color:var(--red)">Error loading analytics.</p>'}
}

async function setQuota(id, quota){
  const q=Math.max(0,Math.min(parseInt(quota)||0,50));
  try{
    await rpc('vetinc_team_admin_set_quota',{p_admin_id:session.id,p_admin_code:session.code,p_employee_id:id,p_daily_call_quota:q});
  }catch(e){console.error(e)}
}

function logout(){session=null;$('app').classList.remove('active');$('agreementGate').classList.remove('active');$('login').classList.remove('hidden');$('liPass').value='';}
</script>
</body>
</html>
